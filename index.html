<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" >
  <link rel="icon" type="image/svg+xml" href="/favicons/favicon.svg" type="image/svg+xml">
  <link rel="icon" type="image/png" href="/favicons/favicon-96x96.png" sizes="96x96" >
  <link rel="shortcut icon" href="/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicons/apple-touch-icon.png" >
<meta name="apple-mobile-web-app-title" content="ck-bio">
  <title>ck-bio</title>
  <style>
    body {font-family: system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial; line-height:1.5; color:#ede7e7; margin:0; padding:0; background:#202020;}
    .wrap {max-width:900px; margin:48px auto; padding:24px;}
    header {display:flex; align-items:center; gap:18px;}
    h1 {margin:0; font-size:1.6rem;}
    p.lead {margin:8px 0 18px; color:#333;}
    .card {border-radius:12px; padding:18px; box-shadow:0 6px 20px rgba(10,10,10,0.06);}
    .row {display:flex; gap:18px; flex-wrap:wrap;}
    .col {flex:1 1 280px;}
    a.button {display:inline-block; padding:8px 12px; border-radius:8px; text-decoration:none; background:#0b63d6; color:#fff;}
    ul {margin:8px 0 0 18px;}
    footer {margin-top:22px; color:#666; font-size:0.9rem;}
    @media (max-width:520px){header{flex-direction:column; align-items:flex-start}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>WIP</h1>
    </header>

    <main style="margin-top:18px">
      <section class="card">       
            <p>WIP</p>
      </section>
    </main>

    <footer>
      <p>Last updated: <span id="updated"></span></p>
    </footer>
  </div>
<script>
    document.getElementById('updated').textContent = 
        new Date(document.lastModified).toLocaleDateString('en_GB', {        
            day:   '2-digit',
            month: '2-digit',
            year:  'numeric'
        });
</script>
</body>
</html>
